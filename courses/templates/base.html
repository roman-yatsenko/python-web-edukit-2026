<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/solar/bootstrap.min.css"
    rel="stylesheet"
  >
  <title>
    {% block title %}
      EduKit
    {% endblock  %}
  </title>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">EduKit</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}">Головна</a>
          </li>
          {% if request.user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link active" href="{% url 'manage_course_list' %}">Мої курси</a>
            </li>
            <li class="nav-item">
              <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-link nav-link border-0">Вихід</button>
              </form>
            </li>
          {% else %}
            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}">Вхід</a>
            </li>
          {% endif %}
        </ul>
        <form class="d-flex" role="search">
          <input class="form-control me-2" type="search" name="q" placeholder="Пошук" aria-label="Пошук">
          <button class="btn btn-outline-light" type="submit">Пошук</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}
    <h1>Hello, World!</h1>
    {% endblock  %}
  </main>

  {% block include_js %}
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    ></script>
  {% endblock  %}

  <script>
    document.addEventListener("DOMContentLoaded", (event) => {
      // DOM-модель завантажена
      {% block domready %}{% endblock  %}
    })
  </script>
</body>
</html>
