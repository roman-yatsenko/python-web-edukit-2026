{% extends "base.html" %}

{% block title %}
  Видалити курс
{% endblock  %}

{% block content %}
  <h2>Видалити курс "{{ object.title }}"</h2>
  <form method="post">
    {% csrf_token %}
    <p>Ви впевнені, що хочете видалити курс "{{ object.title }}" ?</p>
    <input type="submit" value="Так">
    <a class="btn" href="{% url 'manage_course_list' %}">Ні</a>
  </form>
{% endblock content %}
